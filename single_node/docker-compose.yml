services:
  master:
    image: warehousepg-el8
    container_name: mdw
    hostname: mdw
    tty: true
    platform: linux/amd64 
    networks:
      gpdb-network:
    ports:
      - "5432:5432"
    volumes:
      - ./datadirs/master:/data/master
      - ./datadirs/primary:/data/primary
      - ./datadirs/mirror:/data/mirror

networks:
  gpdb-network:
    driver: bridge
